function toTrigramNum(n) {
    const r = Math.abs(Math.floor(n)) % 8;
    return r === 0 ? 8 : r;
}

function findTrigram(lines) {
    for (const [k, t] of Object.entries(TRIGRAMS)) {
        if (t.lines[0]===lines[0] && t.lines[1]===lines[1] && t.lines[2]===lines[2])
            return TRIGRAMS[parseInt(k)];
    }
    return TRIGRAMS[8];
}

function findTrigramNum(lines) {
    for (const [k, t] of Object.entries(TRIGRAMS)) {
        if (t.lines[0]===lines[0] && t.lines[1]===lines[1] && t.lines[2]===lines[2])
            return parseInt(k);
    }
    return 8;
}

function getRelation(selfEl, otherEl) {
    if (selfEl === otherEl)              return { rel:'同我', verdict:'吉',  cls:'res-同'  };
    if (GENERATES[otherEl] === selfEl)   return { rel:'生我', verdict:'吉',  cls:'res-吉'  };
    if (OVERCOMES[selfEl]  === otherEl)  return { rel:'我克', verdict:'小吉',cls:'res-小吉'};
    if (GENERATES[selfEl]  === otherEl)  return { rel:'我生', verdict:'凶',  cls:'res-凶'  };
    if (OVERCOMES[otherEl] === selfEl)   return { rel:'克我', verdict:'凶',  cls:'res-凶'  };
    return { rel:'?', verdict:'?', cls:'' };
}

// ── 画一爻 ──
function lineHTML(val, isChanging) {
    const cls = isChanging ? 'changing-line' : '';
    if (val === 1) {
        return `<div class="line-gfx ${cls}"><span class="lseg yang-seg"></span></div>`;
    } else {
        return `<div class="line-gfx ${cls}"><span class="lseg yin-seg"></span><span class="gap"></span><span class="lseg yin-seg"></span></div>`;
    }
}

// ── 画整个卦 ──
// lowerTag / upperTag: 可选附加标注，如 '体' '用'
function renderHexagram(hexLines, changingLine, title, lowerTri, upperTri, lowerTag, upperTag) {
    function tagBadge(tag) {
        if (!tag) return '';
        const color = tag === '体' ? '#1565c0' : '#8b1a1a';
        return `<span style="font-size:0.72rem;padding:1px 5px;border-radius:3px;border:1px solid ${color};color:${color};margin-left:4px">${tag}卦</span>`;
    }
    let h = `<div class="hex-block">
        <div class="hex-title">${title}</div>
        <div class="tri-label">${upperTri.name}（上）${tagBadge(upperTag)}</div>
        <div class="hex-lines">`;

    for (let i = 5; i >= 0; i--) {
        const ln = i + 1;
        const isC = changingLine && ln === changingLine;
        h += `<div class="hex-line">
            <span class="line-num">${ln}</span>
            ${lineHTML(hexLines[i], isC)}
            ${isC ? '<span class="change-mark">◀变</span>' : ''}
        </div>`;
        if (i === 3) h += `<div class="divider"></div>`;
    }

    h += `</div>
        <div class="tri-label">${lowerTri.name}（下）${tagBadge(lowerTag)}</div>
    </div>`;
    return h;
}

function elTag(el) {
    return `<span class="el el-${el}">${el}</span>`;
}

// ── 主计算 ──
function calculate() {
    const v1 = document.getElementById('num1').value;
    const v2 = document.getElementById('num2').value;
    const n1 = parseInt(v1), n2 = parseInt(v2);

    if (!v1 || !v2 || isNaN(n1) || isNaN(n2)) {
        alert('请输入两个有效数字！');
        return;
    }

    const a1 = Math.abs(n1), a2 = Math.abs(n2);

    // 第二步：求卦数
    const lNum = toTrigramNum(a1);
    const uNum = toTrigramNum(a2);
    const lower = TRIGRAMS[lNum];
    const upper = TRIGRAMS[uNum];

    // 第三步：排卦（下卦爻1-3，上卦爻4-6）
    // origHex 索引 0=爻1(底) … 5=爻6(顶)
    const origHex = [
        lower.lines[0], lower.lines[1], lower.lines[2],
        upper.lines[0], upper.lines[1], upper.lines[2]
    ];

    // 第四步：求变爻
    const sum = a1 + a2;
    const changingLine = sum % 6 === 0 ? 6 : sum % 6;

    // 变卦
    const changedHex = [...origHex];
    changedHex[changingLine - 1] = changedHex[changingLine - 1] === 1 ? 0 : 1;

    const cLowerLines = [changedHex[0], changedHex[1], changedHex[2]];
    const cUpperLines = [changedHex[3], changedHex[4], changedHex[5]];
    const cLower = findTrigram(cLowerLines);
    const cUpper = findTrigram(cUpperLines);
    const cLowerNum = findTrigramNum(cLowerLines);
    const cUpperNum = findTrigramNum(cUpperLines);

    // ── 确定体卦 / 用卦 ──
    // 含变爻的卦 = 用卦（对方/事件），不变的卦 = 体卦（自己）
    let tiGua, yongGua, tiTag_lower, tiTag_upper;
    if (changingLine <= 3) {
        // 变爻在下卦 → 下卦是用卦，上卦是体卦
        yongGua      = lower;
        tiGua        = upper;
        tiTag_lower  = '用';   // 下卦标注
        tiTag_upper  = '体';   // 上卦标注
    } else {
        // 变爻在上卦 → 上卦是用卦，下卦是体卦
        yongGua      = upper;
        tiGua        = lower;
        tiTag_lower  = '体';
        tiTag_upper  = '用';
    }

    // 互卦（取自本卦）
    // 下互卦：爻2,3,4 → 索引1,2,3
    const lnLines = [origHex[1], origHex[2], origHex[3]];
    // 上互卦：爻3,4,5 → 索引2,3,4
    const unLines = [origHex[2], origHex[3], origHex[4]];
    const lowerNuc = findTrigram(lnLines);
    const upperNuc = findTrigram(unLines);
    const lnNum = findTrigramNum(lnLines);
    const unNum = findTrigramNum(unLines);
    const nucHex = [...lnLines, ...unLines];

    const changedSide = changingLine <= 3 ? '下卦' : '上卦';

    // ── 生成 HTML ──
    let html = '';

    // 推演过程
    html += `<div class="card">
        <h2>推演过程</h2>
        <table>
            <tr><th>项目</th><th>计算</th><th>卦象</th><th>角色</th></tr>
            <tr>
                <td>第一数 → 下卦</td>
                <td>${a1} ÷ 8，余 <strong>${lNum}</strong></td>
                <td><strong>${lower.name}</strong>（${lower.element}）</td>
                <td>${tiTag_lower === '体' ? '<span style="color:#1565c0;font-weight:bold">体卦（我）</span>' : '<span style="color:#8b1a1a;font-weight:bold">用卦（对方）</span>'}</td>
            </tr>
            <tr>
                <td>第二数 → 上卦</td>
                <td>${a2} ÷ 8，余 <strong>${uNum}</strong></td>
                <td><strong>${upper.name}</strong>（${upper.element}）</td>
                <td>${tiTag_upper === '体' ? '<span style="color:#1565c0;font-weight:bold">体卦（我）</span>' : '<span style="color:#8b1a1a;font-weight:bold">用卦（对方）</span>'}</td>
            </tr>
            <tr>
                <td>变爻位置</td>
                <td>${a1} + ${a2} = ${sum}，${sum} ÷ 6，余 <strong>${changingLine}</strong></td>
                <td colspan="2">第 <strong>${changingLine}</strong> 爻变（${changedSide}）</td>
            </tr>
        </table>
    </div>`;

    // 卦象展示
    html += `<div class="card">
        <h2>卦象展示</h2>
        <div class="hexagrams-row">
            ${renderHexagram(origHex, changingLine, '本卦', lower, upper, tiTag_lower, tiTag_upper)}
            ${renderHexagram(changedHex, null, '变卦', cLower, cUpper)}
            ${renderHexagram(nucHex, null, '互卦', lowerNuc, upperNuc)}
        </div>
        <p style="font-size:0.82rem;color:#999;text-align:center;margin-top:14px">
            红色爻为变爻 ｜ 蓝色标注为体卦（我）｜ 红色标注为用卦（对方）
        </p>
    </div>`;

    // 五行归属
    const comps = [
        { label:`体卦·${tiGua === lower ? '下卦' : '上卦'}`,  tri: tiGua,    role:'体' },
        { label:`用卦·${yongGua === lower ? '下卦' : '上卦'}`, tri: yongGua,  role:'用' },
        { label:'下互卦', tri: lowerNuc, role:'' },
        { label:'上互卦', tri: upperNuc, role:'' }
    ];

    html += `<div class="card">
        <h2>五行归属</h2>
        <table>
            <tr><th>角色</th><th>卦名</th><th>五行</th></tr>`;
    for (const c of comps) {
        const roleColor = c.role === '体' ? 'color:#1565c0;font-weight:bold' : c.role === '用' ? 'color:#8b1a1a;font-weight:bold' : '';
        html += `<tr>
            <td style="${roleColor}">${c.label}</td>
            <td><strong>${c.tri.name}</strong></td>
            <td>${elTag(c.tri.element)}</td>
        </tr>`;
    }
    html += `</table>
        <div class="ref-row" style="margin-top:14px">
            <span class="ref-badge" style="background:#fff8e1;color:#b08010;border:1px solid #c8a060">乾兑 → 金</span>
            <span class="ref-badge" style="background:#e8f5e9;color:#1e8020;border:1px solid #a5d6a7">震巽 → 木</span>
            <span class="ref-badge" style="background:#e3f2fd;color:#1060cc;border:1px solid #90caf9">坎 → 水</span>
            <span class="ref-badge" style="background:#ffebee;color:#c01010;border:1px solid #ef9a9a">离 → 火</span>
            <span class="ref-badge" style="background:#efebe9;color:#7a5010;border:1px solid #bcaaa4">坤艮 → 土</span>
        </div>
    </div>`;

    // 生克分析（以体卦为"我"）
    const selfEl = tiGua.element;
    html += `<div class="card">
        <h2>生克分析</h2>
        <div class="info-box">
            以 <strong style="color:#1565c0">体卦「${tiGua.name}」（${tiGua.element}）</strong> 为「我」（自己）<br>
            <strong style="color:#8b1a1a">用卦「${yongGua.name}」（${yongGua.element}）</strong> 为对方 / 事件<br>
            生我者为吉 ｜ 同我者为吉 ｜ 我克者小吉 ｜ 我生者为凶 ｜ 克我者为凶
        </div>
        <div class="result-grid">`;

    for (const c of comps.slice(1)) {
        const r = getRelation(selfEl, c.tri.element);
        const roleLabel = c.role === '用' ? '（对方）' : '';
        html += `<div class="result-item ${r.cls}">
            <span class="item-name">${c.label}${roleLabel}「<strong>${c.tri.name}</strong>」${elTag(c.tri.element)}</span>
            <span class="item-rel">${r.rel}</span>
            <span class="item-verdict">${r.verdict}</span>
        </div>`;
    }

    html += `</div></div>`;

    // ── 六十四卦综合解析 ──
    const benHex  = HEXAGRAMS[`${uNum},${lNum}`]   || {num:'?',name:'未知',urlId:'',meaning:''};
    const bianHex = HEXAGRAMS[`${cUpperNum},${cLowerNum}`] || {num:'?',name:'未知',urlId:'',meaning:''};
    const huHex   = HEXAGRAMS[`${unNum},${lnNum}`]  || {num:'?',name:'未知',urlId:'',meaning:''};

    function hexCard(role, roleDesc, hexData, color) {
        const link = hexData.urlId
            ? `<a href="https://www.yilusoso.com/lssg/${hexData.urlId}/" target="_blank" style="font-size:0.82rem;color:${color};text-decoration:underline;margin-left:8px">详细解读 →</a>`
            : '';
        return `<div style="border:1px solid #ddd;border-radius:8px;padding:16px;background:#fafafa;border-left:4px solid ${color}">
            <div style="display:flex;align-items:baseline;gap:8px;margin-bottom:8px;flex-wrap:wrap">
                <span style="font-size:1rem;font-weight:bold;color:${color}">${role}</span>
                <span style="font-size:1.15rem;font-weight:bold;color:#2a1a0a">第${hexData.num}卦·${hexData.name}卦</span>
                <span style="font-size:0.82rem;color:#888">${roleDesc}</span>
                ${link}
            </div>
            <div style="font-size:0.95rem;color:#4a3a2a;line-height:1.8">${hexData.meaning}</div>
        </div>`;
    }

    html += `<div class="card">
        <h2>六十四卦综合解析</h2>
        <div style="display:grid;gap:14px">
            ${hexCard('本卦', '当前整体情况 · 所处环境与局势', benHex, '#1565c0')}
            ${hexCard('变卦', '事情发展趋势 · 未来走向与结果', bianHex, '#8b1a1a')}
            ${hexCard('互卦', '内部隐藏机制 · 中间过程与暗线', huHex, '#2e7d32')}
        </div>
    </div>`;

    const el = document.getElementById('result');
    el.innerHTML = html;
    el.scrollIntoView({ behavior: 'smooth' });
}

// 回车触发
document.addEventListener('keydown', e => {
    if (e.key === 'Enter') calculate();
});
</script>
</body>
</html>
